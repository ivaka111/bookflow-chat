<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BookFlow Chat</title>

    <link
        href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css"
        rel="stylesheet"
    >

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        #n8n-chat {
            width: 100%;
            height: 100%;
        }

        #error-message {
            display: none;
            max-width: 600px;
            margin: 60px auto;
            padding: 24px;
            background: white;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="n8n-chat"></div>

    <div id="error-message">
        <h2>Невалиден чат адрес</h2>
        <p>В линка липсва бизнес идентификатор.</p>
    </div>

    <script type="module">
        import { createChat } from
            'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('business');

        if (!slug) {
            document.getElementById('n8n-chat').style.display = 'none';
            document.getElementById('error-message').style.display = 'block';
        } else {
            createChat({
                webhookUrl: 'https://ivaka.app.n8n.cloud/webhook/ba1b3402-4c1b-4991-a199-89fb4aa95e3d/chat',

                target: '#n8n-chat',

                mode: 'fullscreen',
                
loadPreviousSession: false,
             
                metadata: {
                    business_slug: slug
                },

                showWelcomeScreen: false,

                initialMessages: [
                    'Здравейте! 👋',
                    'Как мога да ви помогна с вашата резервация?'
                ],

                i18n: {
                    en: {
                        title: 'Онлайн резервации',
                        subtitle: 'Изберете услуга и удобен час.',
                        footer: '',
                        getStarted: 'Нов разговор',
                        inputPlaceholder: 'Напишете съобщение...'
                    }
                }
            });

            console.log('BookFlow business slug:', slug);
        }
    </script>

</body>
</html>
